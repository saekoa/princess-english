<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Princess English — ベルと英語練習</title>
    <style>
        /* スタイルは元の素敵なデザインを維持しています */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --pink: #D4537E; --pink-dark: #993556; --pink-light: #FBEAF0;
            --pink-border: #ED93B1; --bg: #f9f7f5; --surface: #ffffff;
            --surface2: #f3f0ed; --border: rgba(0,0,0,0.1);
            --text: #1a1a1a; --text2: #6b6b6b; --radius: 12px;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .chat-area { background: var(--surface2); border-radius: var(--radius); padding: 15px; height: 400px; overflow-y: auto; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px 15px; border-radius: 15px; max-width: 80%; font-size: 14px; line-height: 1.5; }
        .belle { align-self: flex-start; background: white; border: 1px solid var(--border); }
        .player { align-self: flex-end; background: var(--pink); color: white; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: var(--radius); border: 1px solid var(--border); outline: none; }
        button { padding: 10px 20px; background: var(--pink); color: white; border: none; border-radius: var(--radius); cursor: pointer; font-weight: bold; }
        button:disabled { opacity: 0.5; }
    </style>
</head>
<body>
    <div class="container">
        <header style="margin-bottom: 20px; text-align: center;">
            <h1 style="font-size: 20px; color: var(--pink);">🌹 Princess English with Belle</h1>
        </header>

        <div id="chat-area" class="chat-area">
            <div class="bubble belle">Bonjour! I am Belle. Would you like to read a book with me?</div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type in English..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chat-area');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // 会話履歴を保持する配列
        let chatHistory = [
            { role: 'assistant', content: 'Bonjour! I am Belle. Would you like to read a book with me?' }
        ];

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // プレイヤーのメッセージを表示
            addBubble(text, 'player');
            userInput.value = '';
            
            // 履歴に追加
            chatHistory.push({ role: 'user', content: text });

            // 送信中はボタンを無効化
            sendBtn.disabled = true;

            try {
                // Renderのサーバーに送信
                const response = await fetch('/api/belle', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ history: chatHistory }) // サーバーが期待する形式
                });

                if (!response.ok) throw new Error('Network response was not ok');

                const data = await response.json();
                
                // ベルの返信を表示
                addBubble(data.reply, 'belle');
                
                // 履歴に追加
                chatHistory.push({ role: 'assistant', content: data.reply });

            } catch (error) {
                console.error('Error:', error);
                addBubble('Sorry, I feel a bit tired... (サーバーエラーが発生しました)', 'belle');
            } finally {
                sendBtn.disabled = false;
                chatArea.scrollTop = chatArea.scrollHeight;
            }
        }

        function addBubble(text, sender) {
            const div = document.createElement('div');
            div.className = `bubble ${sender}`;
            div.textContent = text;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
