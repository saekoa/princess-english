<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Princess English — ベルと英語練習</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --pink: #D4537E; --pink-dark: #993556; --pink-light: #FBEAF0;
            --pink-border: #ED93B1; --blue-bg: #E6F1FB; --blue-text: #0C447C;
            --bg: #f9f7f5; --surface: #ffffff; --surface2: #f3f0ed;
            --border: rgba(0,0,0,0.1); --text: #1a1a1a; --text2: #6b6b6b;
            --radius: 12px; --radius-sm: 8px;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .container { max-width: 700px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
        .logo { font-size: 18px; font-weight: 600; }
        .logo span { color: var(--pink); }
        .princess-bar { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 0.875rem 1.25rem; margin-bottom: 1rem; }
        .p-avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--pink-light); display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
        .p-name { font-size: 15px; font-weight: 600; }
        .chat-area { background: var(--surface2); border-radius: var(--radius); padding: 1rem; margin-bottom: 1rem; min-height: 200px; display: flex; flex-direction: column; gap: 10px; max-height: 400px; overflow-y: auto; }
        .bubble { padding: 10px 14px; border-radius: var(--radius); font-size: 14px; line-height: 1.6; max-width: 85%; }
        .belle { align-self: flex-start; background: var(--surface); border: 0.5px solid var(--border); border-radius: 4px 12px 12px 12px; }
        .player { align-self: flex-end; background: var(--pink); color: white; border-radius: 12px 4px 12px 12px; }
        .builder { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.5rem; }
        .input-row { display: flex; gap: 8px; margin-top: 15px; }
        input { flex: 1; padding: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); outline: none; }
        button { padding: 10px 20px; background: var(--pink); color: white; border: none; border-radius: var(--radius-sm); cursor: pointer; font-weight: bold; }
        button:disabled { opacity: 0.5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">Princess<span>English</span></div>
        </div>

        <div class="princess-bar">
            <div class="p-avatar">🌹</div>
            <div>
                <div class="p-name">Belle</div>
                <div style="font-size: 12px; color: var(--text2);">Reading in the library</div>
            </div>
        </div>

        <div id="chat-area" class="chat-area">
            <div class="bubble belle">Bonjour! I am Belle. It's a wonderful day to learn English together, isn't it?</div>
        </div>

        <div class="builder">
            <div style="font-size: 12px; color: var(--text2); margin-bottom: 10px;">Message to Belle:</div>
            <div class="input-row">
                <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off">
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chat-area');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        let chatHistory = [
            { role: 'assistant', content: 'Bonjour! I am Belle. It\'s a wonderful day to learn English together, isn\'t it?' }
        ];

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addBubble(text, 'player');
            userInput.value = '';
            chatHistory.push({ role: 'user', content: text });
            sendBtn.disabled = true;

            try {
                // Gemini対応のサーバーへリクエスト
                const response = await fetch('/api/belle', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ history: chatHistory })
                });

                if (!response.ok) throw new Error('Server Error');

                const data = await response.json();
                addBubble(data.reply, 'belle');
                chatHistory.push({ role: 'assistant', content: data.reply });

            } catch (error) {
                console.error('Error:', error);
                addBubble('Oh, something went wrong... Could you try again?', 'belle');
            } finally {
                sendBtn.disabled = false;
            }
        }

        function addBubble(text, sender) {
            const div = document.createElement('div');
            div.className = `bubble ${sender}`;
            div.textContent = text;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
